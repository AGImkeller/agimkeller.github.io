---
layout: default
show_sidebar: false
---

<div class="columns is-multiline">

  <div class="column is-12">
    {{ page.content }}
  </div>

  {% assign sorted_products = site.team | sort:page.sort %}

  {% for product in sorted_products %}
  <div class="column is-3-desktop is-3-tablet">

    <a href="{{ product.url | relative_url }}">

      <div class="card ">

        {% if product.image %}
        <div class="card-image">
          <figure class="image is-4by4">
            <img src="{{ product.image }}"      
            style="object-fit: cover;position: static; width: 400px; height: 400px;"  
            alt="{{ product.title }}" />
          </figure>
        </div>
        {% endif %}
        <div class="card-content">

          <p class="title is-5">{{ product.title }}</h2>
          <p class="subtitle is-5">{{ product.subtitle }}</p>  
          <p class="title is-5 has-text-right">{{ product.price }}</p>

        </div>
      </div>

    </a>

  </div>
{% endfor %}
</div>
